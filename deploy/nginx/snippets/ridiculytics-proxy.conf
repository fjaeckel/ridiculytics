# Shared proxy configuration, included inside a server block by both the http
# and https templates. This file contains only nginx variables and no
# ${PLACEHOLDERS}, so it is mounted as-is and never passed through envsubst.

# Requests are a few hundred bytes; ridiculytics caps the body at 4 KB anyway.
# Rejecting early keeps junk off the Go process entirely.
client_max_body_size 8k;
client_body_timeout 10s;

limit_conn conns 32;

# Docker's embedded DNS. Combined with the $upstream variable below, this forces
# nginx to re-resolve at request time. Without it nginx resolves the upstream
# once at startup and caches that IP forever, so recreating the ridiculytics
# container — which usually gives it a new IP — would black-hole every beacon
# until nginx itself was restarted.
resolver 127.0.0.11 valid=10s ipv6=off;
set $upstream "http://ridiculytics:8080";

location = /api/event {
    limit_req zone=ingest burst=60 nodelay;

    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # The User-Agent must survive: bot filtering and the visitor hash both
    # read it.
    proxy_set_header User-Agent        $http_user_agent;
    proxy_set_header Origin            $http_origin;

    # Beacons are fire-and-forget; never let a slow upstream become latency on
    # somebody else's page.
    proxy_connect_timeout 2s;
    proxy_send_timeout    5s;
    proxy_read_timeout    5s;

    proxy_buffering off;
    access_log off;
}

location = /counter.js {
    proxy_pass $upstream;
    proxy_set_header Host $host;
    expires 24h;
    add_header Cache-Control "public, max-age=86400";
    add_header Access-Control-Allow-Origin "*";
    gzip on;
    gzip_types application/javascript;
}

location = /api/health {
    proxy_pass $upstream;
    proxy_set_header Host $host;
    access_log off;
}

# Everything else is closed. In particular /metrics is NOT proxied: it lives on
# a separate port that is never published to the internet, and exposing it here
# would hand the whole dataset to anyone who asked.
location / {
    return 404;
}
